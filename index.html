<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Success Estimation</title>
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 class="title">Policy Success Estimation</h1>

    <div class="container">
        <!-- Controlli per selezionare le variabili -->
        <div class="controls">
            
            <!-- Selezione delle variabili per il grafico -->
            <div class="control-group">
                <label>Solve for:</label>
                <label><input type="checkbox" class="var-select" value="r"> r</label>
                <label><input type="checkbox" class="var-select" value="a"> a</label>
                <label><input type="checkbox" class="var-select" value="n"> n</label>
                <label><input type="checkbox" class="var-select" value="m"> m</label>
            </div>

            <!-- Sliders per le variabili fisse -->
            <div id="fixed-values">
                <div class="control-group slider-container" id="r-slider">
                    <label for="r">Fixed r:</label>
                    <input type="range" id="r" min="0.0001" max="1" step="0.01" value="0.5" oninput="updateGraph()">
                    <span id="r-value">0.5</span>
                </div>

                <div class="control-group slider-container" id="a-slider">
                    <label for="a">Fixed a:</label>
                    <input type="range" id="a" min="0.0001" max="1" step="0.01" value="0.5" oninput="updateGraph()">
                    <span id="a-value">0.5</span>
                </div>

                <div class="control-group slider-container" id="n-slider">
                    <label for="n">Fixed n:</label>
                    <input type="range" id="n" min="1" max="100" step="1" value="1" oninput="updateGraph()">
                    <span id="n-value">1</span>
                </div>

                <div class="control-group slider-container" id="m-slider">
                    <label for="m">Fixed m:</label>
                    <input type="range" id="m" min="0" max="1" step="0.01" value="0.0" oninput="updateGraph()">
                    <span id="m-value">0.0</span>
                </div>
            </div>

            <!-- Threshold g sempre visibile -->
            <div class="control-group">
                <label for="g">Threshold g:</label>
                <input type="range" id="g" min="0" max="1" step="0.01" value="0.8" oninput="updateGraph()">
                <span id="g-value">0.8</span>
            </div>

        </div>

        <div id="grafico"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
