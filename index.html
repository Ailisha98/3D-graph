<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafico 3D Interattivo</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Titolo principale centrato sopra tutto -->
    <h1 class="title">3D graph of function t</h1>

    <div class="container">
        <!-- Contenitore dei parametri (a sinistra) -->
        <div class="controls">
            <div class="control-group">
                <label for="n">Parameter n:</label>
                <input type="range" id="n" min="1" max="100" step="1" value="1" oninput="updateGraph()">
                <span id="n-value">2</span>
            </div>

            <div class="control-group">
                <label for="g">Threshold g:</label>
                <input type="range" id="g" min="0" max="1" step="0.01" value="0.8" oninput="updateGraph()">
                <span id="g-value">0.8</span>
            </div>

            <div class="control-group">
                <label for="m">Parameter m:</label>
                <input type="range" id="m" min="0" max="1" step="0.01" value="0.0" oninput="updateGraph()">
                <span id="m-value">0.0</span>
            </div>
        </div>

        <!-- Contenitore del grafico (a destra) -->
        <div id="grafico"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
